<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="MakTech Admin Dashboard — manage emails, leads, orders, case studies, blog, jobs and pricing."
    />
    <meta name="theme-color" content="#ffffff" />
    <!-- Logo preloaded before JS runs — cache-warm when React renders it → LCP improvement -->
    <link
      rel="preload"
      as="image"
      href="/maktech_logo.webp"
      fetchpriority="high"
    />
    <style>
      /* Hide shell once React fills #root. Pure CSS, zero JS overhead. */
      #root:not(:empty) + #app-shell {
        display: none;
      }

      #app-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }
    </style>
    <title>MakTech Admin Dashboard</title>
  </head>
  <body class="bg-black-bg">
    <!-- Root div where React application will mount -->
    <div id="root"></div>
    <!--
      Shell lives OUTSIDE #root. Browser paints it before React JS runs → FCP + LCP.
      CSS hides it automatically once #root gets content (→ no JS removal needed).
    -->
    <div id="app-shell" aria-hidden="true">
      <img
        src="/maktech_logo.webp"
        alt=""
        width="120"
        height="32"
        fetchpriority="high"
        style="height: 32px; width: auto; object-fit: contain"
      />
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
