<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/maktech_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MakTech Admin Dashboard — manage emails, leads, orders, case studies, blog, jobs and pricing."
    />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font load: only 4 weights actually used — avoids full variable axis (~200 KB savings) -->
    <link
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
    /></noscript>
    <title>MakTech Admin Dashboard</title>
  </head>
  <body>
    <!-- Root div where React application will mount -->
    <div id="root"></div>
    <!-- Main application script entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
